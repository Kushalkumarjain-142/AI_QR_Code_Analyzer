version: "3.8"

services:

  cassandra:
    image: cassandra:4.1

    ports:
      - "9042:9042"

    healthcheck:
      test: ["CMD","cqlsh","-e","describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  app:
    build: .

    ports:
      - "8501:8501"

    depends_on:
      cassandra:
        condition: service_healthy

    volumes:
      - ./.streamlit:/app/.streamlit

    restart: always